<script><![CDATA[
(function(){
  var svg=document.querySelector('svg');
  var flame=document.getElementById('elemReact');
  var rg=document.getElementById('reactGlow');
  var CX=300, CY=360;
  function stopsOf(id){ var g=document.getElementById(id); return g?Array.prototype.slice.call(g.querySelectorAll('stop')):[]; }
  var flS=stopsOf('fl'), fl2S=stopsOf('fl2');
  function hx(c){ c=c.replace('#',''); return [parseInt(c.substr(0,2),16),parseInt(c.substr(2,2),16),parseInt(c.substr(4,2),16)]; }
  function toHex(a){ return '#'+a.map(function(v){v=Math.max(0,Math.min(255,Math.round(v)));return (v<16?'0':'')+v.toString(16);}).join(''); }
  var flBase=flS.map(function(s){return hx(s.getAttribute('stop-color'));});
  var fl2Base=fl2S.map(function(s){return hx(s.getAttribute('stop-color'));});
  var flHot=[[64,60,24],[120,112,36],[180,168,52],[224,212,120]];
  var fl2Hot=[[120,112,36],[180,168,52],[236,224,150]];
  function lerpC(a,b,t){ return [a[0]+(b[0]-a[0])*t,a[1]+(b[1]-a[1])*t,a[2]+(b[2]-a[2])*t]; }
  var lastWarm=-1;
  function applyWarm(w){
    if(w<0.01) w=0;
    if(Math.abs(w-lastWarm)<0.004) return;
    lastWarm=w;
    for(var i=0;i<flS.length;i++) flS[i].setAttribute('stop-color', toHex(lerpC(flBase[i],flHot[i],w)));
    for(var j=0;j<fl2S.length;j++) fl2S[j].setAttribute('stop-color', toHex(lerpC(fl2Base[j],fl2Hot[j],w)));
  }
  var dx=0, near=0, stoking=false, impulse=0;
  var cSkew=0, cScale=0, cGlow=0, heat=0;
  function toSvg(e){
    var r=svg.getBoundingClientRect();
    var px=(e.touches?e.touches[0].clientX:e.clientX);
    var py=(e.touches?e.touches[0].clientY:e.clientY);
    return {x:(px-r.left)/r.width*600, y:(py-r.top)/r.height*600};
  }
  function onMove(e){
    var p=toSvg(e);
    dx=(p.x-300)/300; if(dx<-1)dx=-1; if(dx>1)dx=1;
    var d=Math.hypot(p.x-300, p.y-300);
    near=1-d/270; if(near<0)near=0;
  }
  function onLeave(){ dx=0; near=0; stoking=false; }
  function onDown(){ stoking=true; impulse=1; }
  function onUp(){ stoking=false; }
  svg.addEventListener('mousemove', onMove);
  svg.addEventListener('mouseleave', onLeave);
  svg.addEventListener('mousedown', onDown);
  window.addEventListener('mouseup', onUp);
  svg.addEventListener('touchstart', function(e){ onDown(); onMove(e); }, {passive:true});
  svg.addEventListener('touchmove', onMove, {passive:true});
  svg.addEventListener('touchend', function(){ onLeave(); });
  function loop(){
    var heatTarget = stoking ? 1.0 : near;
    if(heatTarget>heat) heat += (heatTarget-heat)*0.12;
    else heat += (heatTarget-heat)*0.012;
    impulse *= 0.90;
    var tSkew = -dx*12;
    cSkew  += (tSkew     - cSkew )*0.08;
    cScale += (heat*0.12 - cScale)*0.08;
    cGlow  += (heat*0.70 - cGlow )*0.08;
    var sc = 1 + cScale + impulse*0.10;
    flame.setAttribute('transform','translate('+CX+' '+CY+') skewX('+cSkew.toFixed(3)+') scale('+sc.toFixed(4)+') translate('+(-CX)+' '+(-CY)+')');
    rg.setAttribute('opacity', Math.min(1, cGlow + impulse*0.5).toFixed(3));
    applyWarm(Math.min(1, heat + impulse*0.4));
    requestAnimationFrame(loop);
  }
  applyWarm(0);
  loop();
})();
]]></script>
</svg></body></html>
